        // 即時刷新並渲染 Iframe 沙盒預覽
        function refreshPreview() {
            const file = state.files[state.activeFile];
            if (!file) return;

            // 如果選中非 HTML，則預覽目前工作區中的 index.html
            let previewContent = '';
            if (file.type !== 'html') {
                const htmlFile = Object.values(state.files).find(f => f.type === 'html');
                if (htmlFile) {
                    previewContent = htmlFile.content;
                    browserAddressLabel.textContent = `sandbox://${htmlFile.name} (含引伸 CSS/JS 預覽)`;
                } else {
                    // 若無 HTML 檔案，則建立簡易展示框
                    previewContent = `<html><body style="font-family:sans-serif;padding:40px;text-align:center;color:#64748b;">
                        <h3>找不到預覽目標</h3><p>請建立或載入 HTML 檔案以進行 RWD 預覽。</p>
                    </body></html>`;
                }
            } else {
                previewContent = file.content;
                browserAddressLabel.textContent = `sandbox://${file.name}`;
            }

            try {
                // 將虛擬檔案系統中的 CSS/JS 動態注入到預覽 HTML 中
                const parser = new DOMParser();
                const doc = parser.parseFromString(previewContent, 'text/html');

                // 注入本地 CSS (如果主 HTML 沒有外連或需要覆蓋)
                // 為了讓本系統中的多個檔案可以彼此關聯，我們自動搜尋對應名稱並內聯
                const head = doc.querySelector('head') || doc.documentElement;
                
                Object.values(state.files).forEach(virtualFile => {
                    if (virtualFile.type === 'css') {
                        const styleTag = doc.createElement('style');
                        styleTag.textContent = `/* 來自本地 ${virtualFile.name} */\n` + virtualFile.content;

                    } else if (virtualFile.type === 'js') {
                        const scriptTag = doc.createElement('script');
                        scriptTag.textContent = `/* 來自本地 ${virtualFile.name} */\n` + virtualFile.content;
                        doc.body ? doc.body.appendChild(scriptTag) : doc.documentElement.appendChild(scriptTag);

                });

                // 將組合完畢的 HTML 內容寫入 Iframe
                const finalHtml = new XMLSerializer().serializeToString(doc);
                previewIframe.srcdoc = finalHtml;

                console.error("預覽生成錯誤: ", e);
                previewIframe.srcdoc = `<html><body><h3 style="color:red;">渲染引擎錯誤</h3><pre>${e.message}</pre></body></html>`;

        // 切換編輯與預覽分頁

                codeTab.classList.remove('hidden');
                previewTab.classList.add('hidden');
                rwdToolbar.classList.add('hidden');

                updateLineNumbers();

        }

        // 處理使用者從硬碟拖放或上傳的本地檔案
        function handleLocalFileUpload(event) {
            const files = event.target.files;
            if (!files.length) return;

            let loadedCount = 0;
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                const filename = file.name;
                const extension = filename.split('.').pop().toLowerCase();

                reader.onload = function(e) {
                    const content = e.target.result;
                    state.files[filename] = {
                        name: filename,
                        content: content,
                        type: extension,
                        size: formatBytes(file.size)
                    };
                    loadedCount++;

                    // 當所有選擇的檔案都載入完畢，切換至最後一個載入的檔案
                    if (loadedCount === files.length) {
                        switchToFile(filename);
                        renderFileList();
                        showToast(`已成功載入 ${files.length} 個本地檔案！`, 'check-circle');
                    }
                };

                reader.readAsText(file);
            });
        }

        // 從本地 Web 伺服器網址載入（解決 localhost 開發情境）
        function loadFromLocalUrl() {
            const url = urlInput.value.trim();
            if (!url) {
                showToast('請輸入有效的網址或相對路徑！', 'alert-triangle');
                return;
            }

            // 提取檔名
            let filename = 'fetched_page.html';
            try {
                const urlObj = new URL(url, window.location.href);
                const pathParts = urlObj.pathname.split('/');
                const lastPart = pathParts[pathParts.length - 1];
                if (lastPart && lastPart.includes('.')) {
                    filename = lastPart;
                }
            } catch (e) {
                // 如果是相對路徑，簡單切割
                const parts = url.split('/');
                const last = parts[parts.length - 1];
                if (last && last.includes('.')) {
                    filename = last;
                }
            }

            const extension = filename.split('.').pop().toLowerCase();

            showToast('正在嘗試自本地伺服器讀取...', 'loader');

            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP 錯誤! 狀態碼: ${response.status}`);
                    return response.text();
                })
                .then(text => {
                    state.files[filename] = {
                        name: filename,
                        content: text,
                        type: extension || 'html',
                        size: formatBytes(new Blob([text]).size)
                    };
                    switchToFile(filename);
                    renderFileList();
                    showToast(`成功從伺服器取得: ${filename}`, 'check-circle');
                    urlInput.value = '';
                })
                .catch(error => {
                    console.error("載入失敗: ", error);
                    showToast(`網址載入失敗：請確認 Web 伺服器正在運行，或是否有 CORS 限制。`, 'alert-triangle');
                });
        }

        // 顯示通知
        function showToast(message, iconName = 'info') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            const toastIcon = document.getElementById('toast-icon');

            toastMessage.textContent = message;
            toastIcon.setAttribute('data-lucide', iconName);
            lucide.createIcons();

            // 顯示動畫
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');

            // 3秒後消失
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // 位元轉換格式化小工具
        function formatBytes(bytes, decimals = 1) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }
    </script>
</body>
</html>
